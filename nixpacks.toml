[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npx --yes pnpm@9 i --frozen-lockfile"]

[phases.build]
cmds = ["npx pnpm@9 --filter @workspace/portfolio build && npx pnpm@9 --filter @workspace/api-server build"]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"
