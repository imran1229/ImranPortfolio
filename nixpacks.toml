[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@latest && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/portfolio build && pnpm --filter @workspace/api-server build"]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"
